<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Smythe&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <script type="module" src="./app.js"></script>
</head>

<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>Jimmy's Diner</h1>
                <p>The best burgers and pizzas in town.</p>
            </div>
        </header>
        <main>
            <section id="sec-1">


            </section>
            <section id="sec-2">
                <h3 class="sec-2-title">Your Order</h3>
                <div id="items-container">
                    <!-- item here -->
                </div>
                <div class="total-container">
                    <p>Total price:</p>
                    <p id="total-price">$0</p>
                </div>
                <div class="order-btn-container">
                    <button data-order="order-received" id="order-btn" disabled>Complete Order</button>
                </div>
            </section>
            <section id="modal-card">

                <form>
                    <h3>Enter card details</h3>
                    <div>
                        <input type="text" name="user-name" id="username" placeholder="Enter your name" required>
                    </div>
                    <div>
                        <input type="number" minlength=12 maxlength=12 name="user-name"
                            placeholder="Enter your card number" required>
                    </div>
                    <div>
                        <input type="number" minlength=3 maxlength=3 name="user-name"
                            placeholder="Enter your cvv number" required>
                    </div>
                    <div>
                        <button data-pay="pay" id="pay-btn">Pay</button>
                    </div>
                </form>

            </section>
        </main>
    </div>
</body>

</html>
